<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JIF Cookbook</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Jerusalem International Fellows: The Cookbook - A practitioner's guide for replication">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --base-color: #3A8A88;
      --accent-color: #2C4B6E;
      --text-color: #333;
      --border-color: #C8BBAA;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    
    .sidebar {
      background-color: #f9f8f6;
    }
    
    .content {
      padding: 20px 60px;
    }
    
    h1, h2, h3 {
      color: var(--accent-color);
    }
    
    a {
      color: var(--base-color);
    }
    
    .cover {
      background: linear-gradient(135deg, var(--base-color) 0%, var(--accent-color) 100%);
    }
    
    .cover .cover-main h1 {
      color: white;
      font-size: 3em;
      margin-bottom: 10px;
    }
    
    .cover .cover-main p {
      color: rgba(255, 255, 255, 0.9);
      font-size: 1.1em;
    }
    
    .cover .cover-main button {
      background-color: white;
      color: var(--base-color);
      border: 1px solid white;
      padding: 10px 30px;
      border-radius: 5px;
      margin-top: 20px;
    }
    
    .cover .cover-main button:hover {
      background-color: var(--border-color);
      color: var(--accent-color);
    }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'JIF Cookbook',
      repo: 'https://github.com/ANyashina-LLC/jif-cookbook',
      logo: '',
      basePath: '/',
      homepage: 'home.md',
      loadSidebar: true,
      autoHeader: true,
      auto2top: true,
      themeColor: '#3A8A88',
      coverpage: true,
      onlyCover: false,
      maxLevel: 3,
      subMaxLevel: 2,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search the Cookbook...',
        noData: 'No results found',
        depth: 3
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
