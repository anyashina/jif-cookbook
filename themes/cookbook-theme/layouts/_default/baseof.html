<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} | JIF Cookbook</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/svg+xml" href="/assets/jif-logo.svg">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            {{ partial "sidebar.html" . }}
        </aside>
        <main class="content">
            <header class="top-nav">
                <img src="/assets/jif-logo.svg" alt="JIF Logo" class="logo">
                <h1>{{ .Site.Title }}</h1>
            </header>
            <article class="page-content">
                {{ .Content }}
            </article>
        </main>
    </div>
</body>
</html>
