<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Jerusalem International Fellows: The Cookbook">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <title>JIF Cookbook</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..150,400;0,9..150,500;0,9..150,600;1,9..150,400&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <style>
    :root {
      --primary-teal: #3A8A88;
      --accent-navy: #2C4B6E;
      --background-warm-white: #F7F4F0;
      --secondary-sand: #C8BBAA;
      --text-dark: #2C2C2C;
      --text-light: #666666;
    }

    * { box-sizing: border-box; }

    html, body {
      background-color: var(--background-warm-white);
      font-family: 'DM Sans', sans-serif;
      color: var(--text-dark);
    }

    .markdown-section h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem;
      font-weight: 600;
      color: var(--accent-navy);
    }

    .markdown-section h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      color: var(--accent-navy);
      border-left: 4px solid var(--primary-teal);
      padding-left: 1.5rem;
      margin-top: 2rem;
    }

    .markdown-section h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      color: var(--primary-teal);
    }

    .markdown-section a {
      color: var(--primary-teal);
    }

    .markdown-section a:hover {
      color: var(--accent-navy);
    }

    .sidebar {
      background-color: var(--background-warm-white);
      border-right: 1px solid var(--secondary-sand);
      position: relative;
      height: 100vh;
    }

    .sidebar-logo {
      padding: 1.5rem 1rem;
      text-align: center;
      border-bottom: 2px solid var(--primary-teal);
      margin-bottom: 1.5rem;
    }

    .sidebar-logo img {
      width: 100%;
      max-width: 240px;
      height: auto;
    }

    .sidebar ul li a {
      color: var(--text-dark);
      font-size: 0.95rem;
    }

    .sidebar ul li a:hover {
      color: var(--primary-teal);
    }

    .sidebar ul li.active > a {
      color: var(--primary-teal);
      font-weight: 600;
      border-right: 3px solid var(--primary-teal);
    }

    .sidebar h1 { display: none; }

    .sidebar-footer {
      position: absolute;
      bottom: 2rem;
      left: 0;
      right: 0;
      text-align: center;
      padding: 1.5rem 1rem;
      border-top: 1px solid var(--secondary-sand);
    }

    .sidebar-footer img {
      height: 80px;
      width: auto;
      opacity: 0.8;
      margin-bottom: 0.5rem;
    }

    .sidebar-footer p {
      font-size: 0.8rem;
      color: var(--text-light);
      margin: 0;
    }

    .app-nav {
      background-color: var(--background-warm-white);
      border-bottom: 1px solid var(--secondary-sand);
    }

    .search input {
      border: 1px solid var(--secondary-sand);
      color: var(--text-dark);
    }

    .search input:focus {
      border-color: var(--primary-teal);
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'Jerusalem International Fellows: The Cookbook',
      repo: 'https://github.com/anyashina/jif-cookbook',
      homepage: 'home.md',
      loadSidebar: true,
      loadNavbar: false,
      coverpage: false,
      autoHeader: true,
      auto2top: true,
      maxLevel: 3,
      themeColor: '#3A8A88',
      search: 'auto'
    };
  </script>

  <script>
    // Add logo and footer after page loads
    function addBranding() {
      const sidebar = document.querySelector('.sidebar');
      if (!sidebar) {
        setTimeout(addBranding, 100);
        return;
      }

      // Add logo
      if (!sidebar.querySelector('.sidebar-logo')) {
        const logo = document.createElement('div');
        logo.className = 'sidebar-logo';
        logo.innerHTML = '<img src="./assets/jif-logo.svg" alt="Jerusalem International Fellows">';
        const sidebarNav = sidebar.querySelector('.sidebar-nav');
        if (sidebarNav) {
          sidebarNav.parentElement.insertBefore(logo, sidebarNav);
        }
      }

      // Add footer
      if (!sidebar.querySelector('.sidebar-footer')) {
        const footer = document.createElement('div');
        footer.className = 'sidebar-footer';
        footer.innerHTML = '<img src="./assets/feather.png" alt="Feather"><p>Prepared by<br>ANyashina LLC</p>';
        sidebar.appendChild(footer);
      }
    }

    // Watch for sidebar changes
    window.addEventListener('load', addBranding);
    const observer = new MutationObserver(addBranding);
    observer.observe(document.body, { childList: true, subtree: true });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
