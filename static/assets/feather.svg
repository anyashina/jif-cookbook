<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <!-- Glow effect definition -->
  <defs>
    <filter id="featherGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Gradient for feather -->
    <linearGradient id="featherGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3A8A88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C6B69;stop-opacity:1" />
    </linearGradient>
    
    <!-- Amber glow gradient -->
    <radialGradient id="amberGlow">
      <stop offset="0%" style="stop-color:#F0D89B;stop-opacity:0.8" />
      <stop offset="70%" style="stop-color:#D4A574;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Amber glow background -->
  <circle cx="100" cy="150" r="80" fill="url(#amberGlow)"/>
  
  <!-- Main feather shape -->
  <g filter="url(#featherGlow)">
    <!-- Feather spine -->
    <path d="M 100 20 Q 95 80, 100 150 Q 105 220, 100 280" 
          stroke="#3A8A88" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Upper left feather strands -->
    <path d="M 100 30 Q 75 50, 60 45" stroke="#3A8A88" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>
    <path d="M 98 50 Q 65 65, 50 60" stroke="#3A8A88" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85"/>
    <path d="M 97 70 Q 60 80, 45 75" stroke="#3A8A88" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>
    <path d="M 96 90 Q 58 95, 40 92" stroke="#3A8A88" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.75"/>
    
    <!-- Upper right feather strands -->
    <path d="M 100 30 Q 125 50, 140 45" stroke="#3A8A88" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>
    <path d="M 102 50 Q 135 65, 150 60" stroke="#3A8A88" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85"/>
    <path d="M 103 70 Q 140 80, 155 75" stroke="#3A8A88" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>
    <path d="M 104 90 Q 142 95, 160 92" stroke="#3A8A88" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.75"/>
    
    <!-- Middle left feather strands -->
    <path d="M 99 110 Q 70 120, 55 120" stroke="#3A8A88" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M 98 130 Q 65 135, 50 138" stroke="#3A8A88" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.65"/>
    
    <!-- Middle right feather strands -->
    <path d="M 101 110 Q 130 120, 145 120" stroke="#3A8A88" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M 102 130 Q 135 135, 150 138" stroke="#3A8A88" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.65"/>
    
    <!-- Lower left feather strands -->
    <path d="M 99 150 Q 68 155, 52 160" stroke="#3A8A88" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M 98 170 Q 65 175, 48 185" stroke="#3A8A88" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.55"/>
    <path d="M 97 190 Q 62 200, 45 215" stroke="#3A8A88" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
    
    <!-- Lower right feather strands -->
    <path d="M 101 150 Q 132 155, 148 160" stroke="#3A8A88" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M 102 170 Q 135 175, 152 185" stroke="#3A8A88" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.55"/>
    <path d="M 103 190 Q 138 200, 155 215" stroke="#3A8A88" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
    
    <!-- Tip strands -->
    <path d="M 100 250 Q 85 270, 80 285" stroke="#3A8A88" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>
    <path d="M 100 250 Q 115 270, 120 285" stroke="#3A8A88" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>
  </g>
  
  <!-- Responsive sizing note: This SVG scales to container width while maintaining aspect ratio -->
</svg>
